<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visor 3D - Obstetricia</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#eef2f7;
}

.navbar{
    display:flex;
    background-color:#333;
}

.navbar a{
    color:white;
    padding:14px 16px;
    text-decoration:none;
}

.navbar a:hover{
    background-color:#575757;
}

/* SELECT NAVBAR */
.navbar-select{
    background:#333;
    color:white;
    border:none;
    padding:14px 16px;
    font-size:16px;
    cursor:pointer;
    outline:none;
    min-width:110px;
    height:48px;
    text-align:center;
}

.navbar-select:hover{
    background-color:#575757;
}

.main{
    display:flex;
    height:calc(100vh - 48px);
}

.sidebar{
    width:260px;
    background:white;
    padding:20px;
    overflow-y:auto;
    border-right:1px solid #ddd;
}

.button-group{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:15px;
}

.button-group button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#f1f3f7;
    cursor:pointer;
    transition:0.2s;
}

.button-group button:hover{
    background:#dfe4ea;
}

.button-group button.active{
    background:#2c2c54;
    color:white;
}

select{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

.center{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:#4a6cf7;
}

model-viewer{
    width:85%;
    height:500px;
}

.controles{
    margin-top:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.controles button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#2c2c54;
    color:white;
    cursor:pointer;
}

.controles button:hover{
    background:#40407a;
}

.right-panel{
    width:320px;
    background:white;
    padding:20px;
    border-left:1px solid #ddd;
}

.card{
    background:#2c2c54;
    color:white;
    padding:20px;
    border-radius:20px;
}

.item{
    margin-bottom:18px;
}

.label{
    font-size:14px;
    opacity:0.8;
}

.value{
    font-size:18px;
    font-weight:bold;
}

#valorFinal{
    font-size:40px;
    margin-top:20px;
    text-align:center;
}

.estado{
    margin-top:15px;
    text-align:center;
    font-size:14px;
    opacity:0.8;
}
</style>
</head>

<body>

<div class="navbar">

    <a href="index.html">Inicio</a>

    <a href="piso1.html">Piso 1</a>

    <!-- SELECT PISO 2 -->
    <select class="navbar-select" onchange="irAPagina(this.value)">
        <option value="">Piso 2 ▼</option>
        <option value="uci6.html">UCI</option>
        <option value="uti18.html">UTI</option>
    </select>

    <select class="navbar-select" onchange="irAPagina(this.value)">
        <option value="">Piso 4 ▼</option>
        <option value="obstetricia.html">Obstetricia</option>
    </select>

</div>


    <a href="obstetricia.html">Obstetricia</a>
</div>

<div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>Inicio</h2>

        
        

       

    </div>

    <!-- CENTRO -->
    <div class="center">

        <model-viewer
            id="visor"
            src="piso1.glb"
            camera-controls
            auto-rotate>
        </model-viewer>

        <div class="controles">

            <button onclick="moverArriba()">⬆️</button>
            <button onclick="moverAbajo()">⬇️</button>
            <button onclick="moverIzquierda()">⬅️</button>
            <button onclick="moverDerecha()">➡️</button>
            <button onclick="zoomIn()">+</button>
            <button onclick="zoomOut()">-</button>

        </div>

    </div>

    <!-- PANEL DERECHO -->
    <div class="right-panel">
 <h2>Hospital De Melipilla</h2>
        
</div>

<script>

const visor = document.getElementById("visor");

let theta = 0;
let phi = 75;
let radius = 2.5;

let indicador = "";
let anio = "";
let mes = "";

const API_URL = "https://api-hsjmelipilla.onrender.com/api/valores/";

// ================= CAMERA =================

function actualizarCamara(){
    visor.cameraOrbit = `${theta}deg ${phi}deg ${radius}m`;
}

function moverIzquierda(){
    theta -= 10;
    actualizarCamara();
}

function moverDerecha(){
    theta += 10;
    actualizarCamara();
}

function moverArriba(){
    phi -= 10;
    actualizarCamara();
}

function moverAbajo(){
    phi += 10;
    actualizarCamara();
}

function zoomIn(){
    radius = Math.max(1, radius - 0.3);
    actualizarCamara();
}

function zoomOut(){
    radius += 0.3;
    actualizarCamara();
}

// ================= FILTROS =================

function seleccionarIndicador(btn,texto){

    document
        .querySelectorAll(".sidebar .button-group:first-of-type button")
        .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");

    indicador = texto;

    document.getElementById("val1").innerText = texto;

    obtenerDatos();
}

function seleccionarAnio(btn,texto){

    document
        .querySelectorAll(".sidebar .button-group:nth-of-type(2) button")
        .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");

    anio = parseInt(texto);

    document.getElementById("val2").innerText = texto;

    obtenerDatos();
}

function actualizarMes(){

    const select = document.getElementById("mesSelect");

    mes = parseInt(select.value);

    const nombreMes =
        select.options[select.selectedIndex].text;

    document.getElementById("val3").innerText = nombreMes;

    obtenerDatos();
}

// ================= API =================

async function obtenerDatos(){

    if(!indicador || !anio || !mes){
        return;
    }

    const estado = document.getElementById("estado");
    const valorFinal = document.getElementById("valorFinal");

    estado.innerText = "Consultando API...";
    valorFinal.innerText = "...";

    try{

        const response = await fetch(API_URL);

        if(!response.ok){
            throw new Error("Error HTTP " + response.status);
        }

        const datos = await response.json();

        console.log("DATOS API:", datos);

        // buscar coincidencia exacta
        const resultado = datos.find(item =>

            item.servicio_nombre === "Obstetricia" &&
            item.indicador_nombre === indicador &&
            item.anio === anio &&
            item.mes === mes
        );

        console.log("RESULTADO:", resultado);

        if(resultado){

            valorFinal.innerText = resultado.valor_calculado;

            estado.innerText = "Datos cargados correctamente";

        }else{

            valorFinal.innerText = "Sin datos";

            estado.innerText =
                `No existen datos para ${anio}`;
        }

    }catch(error){

        console.error(error);

        valorFinal.innerText = "ERROR";

        estado.innerText = "Error al conectar API";
    }
}

</script>

<script
type="module"
src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js">
</script>

</body>
</html>
