<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Visor 3D</title>
</head>
<body>

<model-viewer
    id="visor"
    src="prueba2.gltf"
    camera-controls
    
    alt="avatar"
    shadow-intensity="1">
    </model-viewer>
<div class="controles">
    <button onclick="moverArriba()">⬆️</button>
    <button onclick="moverAbajo()">⬇️</button>
    <button onclick="moverIzquierda()">⬅️</button>
    <button onclick="moverDerecha()">➡️</button>
    <button onclick="zoomIn()">Zoom +</button>
    <button onclick="zoomOut()">Zoom -</button>
  </div>
</div>



<script>
const visor = document.getElementById("visor");

function obtenerOrbit() {
  let orbit = visor.getAttribute("camera-orbit") || "0deg 75deg 2m";
  return orbit.split(" ");
}

function moverIzquierda() {
  let orbit = obtenerOrbit();
  let theta = parseFloat(orbit[0]);

  theta -= 10;

  visor.setAttribute("camera-orbit", `${theta}deg ${orbit[1]} ${orbit[2]}`);
}

function moverDerecha() {
  let orbit = obtenerOrbit();
  let theta = parseFloat(orbit[0]);

  theta += 10;

  visor.setAttribute("camera-orbit", `${theta}deg ${orbit[1]} ${orbit[2]}`);
}

function moverArriba() {
  let orbit = obtenerOrbit();
  let phi = parseFloat(orbit[1]);

  phi -= 10;
  phi = Math.max(10, phi); // límite superior

  visor.setAttribute("camera-orbit", `${orbit[0]} ${phi}deg ${orbit[2]}`);
}

function moverAbajo() {
  let orbit = obtenerOrbit();
  let phi = parseFloat(orbit[1]);

  phi += 10;
  phi = Math.min(170, phi); // límite inferior

  visor.setAttribute("camera-orbit", `${orbit[0]} ${phi}deg ${orbit[2]}`);
}

function zoomIn() {
  let orbit = obtenerOrbit();
  let radius = parseFloat(orbit[2]);
  radius = Math.max(0.5, radius - 0.2);

  visor.setAttribute("camera-orbit", `${orbit[0]} ${orbit[1]} ${radius}m`);
}

function zoomOut() {
  let orbit = obtenerOrbit();
  let radius = parseFloat(orbit[2]);
  radius += 0.2;

  visor.setAttribute("camera-orbit", `${orbit[0]} ${orbit[1]} ${radius}m`);
}
</script>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
</body>
</html>
