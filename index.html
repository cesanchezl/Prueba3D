<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Visor 3D</title>
</head>
<body>

<model-viewer
    src="prueba2.gltf"
    camera-controls
    alt="avatar"
    shadow-intensity="1">
    </model-viewer>
    <button onclick="rotarIzquierda()">⬅️</button>
<button onclick="rotarDerecha()">➡️</button>

<script>
const viewer = document.getElementById("viewer");

function rotarIzquierda() {
  viewer.cameraOrbit = "0deg 75deg 105%";
}

function rotarDerecha() {
  viewer.cameraOrbit = "180deg 75deg 105%";
}

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
</body>
</html>
