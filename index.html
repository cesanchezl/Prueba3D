<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Visor 3D - Hospital Melipilla</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar">

    <a href="index.html">Inicio</a>

    <a href="piso1.html">Piso 1</a>

    <!-- PISO 2 -->
    <select class="navbar-select" onchange="irAPagina(this.value)">
        <option value="">Piso 2 ▼</option>
        <option value="uci6.html">UCI</option>
        <option value="uti18.html">UTI</option>
    </select>

    <a href="#">Piso 3</a>

    <!-- PISO 4 -->
    <select class="navbar-select" onchange="irAPagina(this.value)">
        <option value="">Piso 4 ▼</option>
        <option value="obstetricia.html">Obstetricia</option>
    </select>

    <a href="#">Piso 5</a>

    <a href="#">Piso 6</a>

    <a href="#">Piso 7</a>

</nav>

<!-- ================= CONTENIDO ================= -->

<div class="main">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <h2>Bienvenido</h2>

        <p>
            Plataforma interactiva hospitalaria con visualización 3D.
        </p>

    </aside>

    <!-- CENTRO -->
    <main class="center">

        <model-viewer
            id="visor"
            src="piso1.glb"
            camera-controls
            auto-rotate>

        </model-viewer>

        <!-- CONTROLES -->
        <div class="controles">

            <button onclick="moverArriba()">⬆️</button>

            <button onclick="moverAbajo()">⬇️</button>

            <button onclick="moverIzquierda()">⬅️</button>

            <button onclick="moverDerecha()">➡️</button>

            <button onclick="zoomIn()">＋</button>

            <button onclick="zoomOut()">－</button>

        </div>

    </main>

    <!-- PANEL DERECHO -->
    <aside class="right-panel">

        <div class="card">

            <h2>Hospital Melipilla</h2>

            <p>
                Sistema de monitoreo y visualización de servicios hospitalarios.
            </p>

        </div>

    </aside>

</div>

<!-- ================= SCRIPT ================= -->

<script>

const visor = document.getElementById("visor");

let theta = 0;
let phi = 75;
let radius = 2.5;

// ================= NAVBAR =================

function irAPagina(url){

    if(url){
        window.location.href = url;
    }
}

// ================= CAMERA =================

function actualizarCamara(){

    visor.cameraOrbit =
        `${theta}deg ${phi}deg ${radius}m`;
}

function moverIzquierda(){

    theta -= 10;

    actualizarCamara();
}

function moverDerecha(){

    theta += 10;

    actualizarCamara();
}

function moverArriba(){

    phi -= 10;

    actualizarCamara();
}

function moverAbajo(){

    phi += 10;

    actualizarCamara();
}

function zoomIn(){

    radius = Math.max(1, radius - 0.3);

    actualizarCamara();
}

function zoomOut(){

    radius += 0.3;

    actualizarCamara();
}

</script>

<!-- MODEL VIEWER -->

<script
type="module"
src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js">
</script>

</body>
</html>
