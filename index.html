<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visor 3D - Inicio</title>
<link rel="stylesheet" href="styles.css">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Visor 3D - Obstetricia</title>

<style>

/* RESET */
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#eef2f7;
}

/* ================= NAVBAR ================= */

.navbar{

    display:flex;
    align-items:center;

    background:#222;

    height:56px;
}

/* TODOS IGUALES */

.navbar a,
.navbar-select{

    width:120px;
    height:56px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:#222;
    color:white;

    text-decoration:none;

    border:none;
    outline:none;

    font-size:16px;

    cursor:pointer;

    transition:0.2s;
}

/* HOVER */

.navbar a:hover,
.navbar-select:hover{

    background:#444;
}

/* SELECT */

.navbar-select{

    appearance:none;
    -webkit-appearance:none;
    -moz-appearance:none;
}

/* OPCIONES */

.navbar-select option{

    background:#222;
    color:white;
}

/* ================= MAIN ================= */

.main{

    display:flex;

    height:calc(100vh - 56px);
}

/* ================= SIDEBAR ================= */

.sidebar{

    width:240px;

    background:white;

    padding:20px;

    border-right:1px solid #ddd;
}

.sidebar h2{

    margin-top:0;
}

/* ================= CENTRO ================= */

.center{

    flex:1;

    display:flex;
    flex-direction:column;

    align-items:center;
    justify-content:center;

    background:#4a6cf7;
}

/* MODEL VIEWER */

model-viewer{

    width:85%;
    height:500px;
}

/* ================= CONTROLES ================= */

.controles{

    margin-top:15px;

    display:flex;

    gap:10px;
}

.controles button{

    width:42px;
    height:42px;

    border:none;

    border-radius:8px;

    background:#2c2c54;

    color:white;

    cursor:pointer;

    font-size:16px;
}

.controles button:hover{

    background:#40407a;
}

/* ================= PANEL DERECHO ================= */

.right-panel{

    width:300px;

    background:white;

    padding:20px;

    border-left:1px solid #ddd;
}

.card{

    background:#2c2c54;

    color:white;

    padding:20px;

    border-radius:20px;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <a href="index.html">Inicio</a>

    <a href="piso1.html">Piso 1</a>

    <!-- SELECT PISO 2 -->
    <select class="navbar-select" onchange="irAPagina(this.value)">
        <option value="">Piso 2 ▼</option>
        <option value="uci6.html">UCI</option>
        <option value="uti18.html">UTI</option>
    </select>

    <a href="">Piso 3</a>

    <!-- SELECT PISO 4 -->
    <select class="navbar-select" onchange="irAPagina(this.value)">
        <option value="">Piso 4 ▼</option>
        <option value="obstetricia.html">Obstetricia</option>
    </select>

    <a href="">Piso 5</a>

    <a href="">Piso 6</a>

    <a href="">Piso 7</a>

</div>

<div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>Bienvenido</h2>

    </div>

    <!-- CENTRO -->
    <div class="center">

        <model-viewer
            id="visor"
            src="piso1.glb"
            camera-controls
            auto-rotate>
        </model-viewer>

        <div class="controles">

            <button onclick="moverArriba()">⬆️</button>
            <button onclick="moverAbajo()">⬇️</button>
            <button onclick="moverIzquierda()">⬅️</button>
            <button onclick="moverDerecha()">➡️</button>
            <button onclick="zoomIn()">+</button>
            <button onclick="zoomOut()">-</button>

        </div>

    </div>

    <!-- PANEL DERECHO -->
    <div class="right-panel">

        <h2>Hospital Melipilla</h2>

    </div>

</div>

<script>

const visor = document.getElementById("visor");

let theta = 0;
let phi = 75;
let radius = 2.5;

let indicador = "";
let anio = "";
let mes = "";

const API_URL = "https://api-hsjmelipilla.onrender.com/api/valores/";

// ================= NAVBAR =================

function irAPagina(url){

    if(url){
        window.location.href = url;
    }
}

// ================= CAMERA =================

function actualizarCamara(){

    visor.cameraOrbit =
        `${theta}deg ${phi}deg ${radius}m`;
}

function moverIzquierda(){

    theta -= 10;

    actualizarCamara();
}

function moverDerecha(){

    theta += 10;

    actualizarCamara();
}

function moverArriba(){

    phi -= 10;

    actualizarCamara();
}

function moverAbajo(){

    phi += 10;

    actualizarCamara();
}

function zoomIn(){

    radius = Math.max(1, radius - 0.3);

    actualizarCamara();
}

function zoomOut(){

    radius += 0.3;

    actualizarCamara();
}

// ================= FILTROS =================

function seleccionarIndicador(btn,texto){

    document
        .querySelectorAll(".sidebar .button-group button")
        .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");

    indicador = texto;

    document.getElementById("val1").innerText = texto;

    obtenerDatos();
}

// ================= AÑO =================

function actualizarAnio(){

    const select = document.getElementById("anioSelect");

    anio = parseInt(select.value);

    document.getElementById("val2").innerText = select.value;

    obtenerDatos();
}

// ================= MES =================

function actualizarMes(){

    const select = document.getElementById("mesSelect");

    mes = parseInt(select.value);

    const nombreMes =
        select.options[select.selectedIndex].text;

    document.getElementById("val3").innerText = nombreMes;

    obtenerDatos();
}

// ================= API =================

async function obtenerDatos(){

    if(!indicador || !anio || mes === ""){
        return;
    }

    const estado = document.getElementById("estado");
    const valorFinal = document.getElementById("valorFinal");

    estado.innerText = "Consultando API...";
    valorFinal.innerText = "...";

    try{

        const response = await fetch(API_URL);

        if(!response.ok){
            throw new Error("Error HTTP " + response.status);
        }

        const datos = await response.json();

        console.log("DATOS API:", datos);

        // ================= TODOS LOS MESES =================
        if(mes === 0){

            const resultados = datos.filter(item =>

                item.servicio_nombre === "UTI" &&
                item.indicador_nombre === indicador &&
                item.anio === anio
            );

            if(resultados.length > 0){

                const suma = resultados.reduce((total,item) => {

                    return total + Number(item.valor_calculado);

                },0);

                valorFinal.innerText = suma.toFixed(2);

                estado.innerText =
                    "Suma total de todos los meses";

            }else{

                valorFinal.innerText = "Sin datos";

                estado.innerText =
                    `No existen datos para ${anio}`;
            }

            return;
        }

        // ================= MES INDIVIDUAL =================

        const resultado = datos.find(item =>

            item.servicio_nombre === "UTI" &&
            item.indicador_nombre === indicador &&
            item.anio === anio &&
            item.mes === mes
        );

        console.log("RESULTADO:", resultado);

        if(resultado){

            valorFinal.innerText =
                resultado.valor_calculado;

            estado.innerText =
                "Datos cargados correctamente";

        }else{

            valorFinal.innerText = "Sin datos";

            estado.innerText =
                `No existen datos para ${anio}`;
        }

    }catch(error){

        console.error(error);

        valorFinal.innerText = "ERROR";

        estado.innerText = "Error al conectar API";
    }
}

</script>

<script
type="module"
src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js">
</script>

</body>
</html>
