<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Visor 3D</title>
</head>
<body>

<model-viewer
    id="visor"
    src="prueba2.gltf"
    camera-controls
    
    alt="avatar"
    shadow-intensity="1">
    </model-viewer>
<div class="controles">
    <button onclick="moverArriba()">⬆️</button>
    <button onclick="moverAbajo()">⬇️</button>
    <button onclick="moverIzquierda()">⬅️</button>
    <button onclick="moverDerecha()">➡️</button>
    <button onclick="zoomIn()">Zoom +</button>
    <button onclick="zoomOut()">Zoom -</button>
  </div>
</div>



<script>
const visor = document.getElementById("visor");

function moverIzquierda() {
  const orbit = visor.cameraOrbit;
  orbit.theta -= 0.2;
  visor.cameraOrbit = orbit;
}

function moverDerecha() {
  const orbit = visor.cameraOrbit;
  orbit.theta += 0.2;
  visor.cameraOrbit = orbit;
}

function moverArriba() {
  const orbit = visor.cameraOrbit;
  orbit.phi -= 0.2;
  orbit.phi = Math.max(0.1, orbit.phi);
  visor.cameraOrbit = orbit;
}

function moverAbajo() {
  const orbit = visor.cameraOrbit;
  orbit.phi += 0.2;
  orbit.phi = Math.min(Math.PI - 0.1, orbit.phi);
  visor.cameraOrbit = orbit;
}

function zoomIn() {
  const orbit = visor.cameraOrbit;
  orbit.radius -= 0.2;
  orbit.radius = Math.max(0.5, orbit.radius);
  visor.cameraOrbit = orbit;
}

function zoomOut() {
  const orbit = visor.cameraOrbit;
  orbit.radius += 0.2;
  visor.cameraOrbit = orbit;
}
</script>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
</body>
</html>
