<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visor 3D - Obstetricia</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #eef2f7;
}

.navbar {
    display: flex;
    background-color: #333;
}

.navbar a {
    color: white;
    padding: 14px 16px;
    text-decoration: none;
}

.navbar a:hover {
    background-color: #575757;
}

.dropdown { position: relative; }

.dropdown-content {
    display: none;
    position: absolute;
    background: white;
    min-width: 160px;
}

.dropdown:hover .dropdown-content {
    display: block;
}

.main {
    display: flex;
    height: calc(100vh - 48px);
}

.sidebar {
    width: 260px;
    background: white;
    padding: 20px;
    overflow-y: auto;
}

.button-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 15px;
}

.button-group button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #f1f3f7;
    cursor: pointer;
}

.button-group button.active {
    background: #2c2c54;
    color: white;
}

.center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #4a6cf7;
}

model-viewer {
    width: 85%;
    height: 500px;
}

.controles {
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

.controles button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #2c2c54;
    color: white;
    cursor: pointer;
}

.controles button:hover {
    background: #40407a;
}

.right-panel {
    width: 300px;
    background: white;
    padding: 20px;
}

.card {
    background: #2c2c54;
    color: white;
    padding: 20px;
    border-radius: 20px;
}

.item { margin-bottom: 15px; }

.label {
    font-size: 14px;
    opacity: 0.8;
}

.value {
    font-size: 18px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="navbar">
    <a href="#">Inicio</a>
    <a href="#">Piso 1</a>

    <div class="dropdown">
        <a>Piso 2 ▼</a>
        <div class="dropdown-content">
            <a href="#">Piso 2</a>
            <a href="#">UCI</a>
            <a href="#">UTI</a>
        </div>
    </div>

    <a href="#">Obstetricia</a>
</div>

<div class="main">

<div class="sidebar">

<h2>Indicadores</h2>
<div class="button-group">
    <button onclick="actualizarBoton(this,'val1','Promedio Dias de Estadia')">Días Estadia</button>
    <button onclick="actualizarBoton(this,'val1','Indice de Rotacion')">Indice de Rotación</button>
    <button onclick="actualizarBoton(this,'val1','Promedio de Camas Disponibles')">Promedio Camas</button>
    <button onclick="actualizarBoton(this,'val1','Indice de Sustitucion')">Indice Sustitución</button>
    <button onclick="actualizarBoton(this,'val1','Indice de Ocupacion')">Indice Ocupación</button>
    <button onclick="actualizarBoton(this,'val1','Lealtad')">Lealtad</button>
</div>

<h2>Año</h2>
<div class="button-group">
    <button onclick="actualizarBoton(this,'val2','2023')">2023</button>
    <button onclick="actualizarBoton(this,'val2','2024')">2024</button>
    <button onclick="actualizarBoton(this,'val2','2025')">2025</button>
</div>

<h2>Mes</h2>
<select onchange="actualizarMes()">
    <option disabled selected>Seleccionar Mes</option>
    <option>Enero</option>
    <option>Febrero</option>
    <option>Marzo</option>
    <option>Abril</option>
    <option>Mayo</option>
    <option>Junio</option>
    <option>Julio</option>
    <option>Agosto</option>
    <option>Septiembre</option>
    <option>Octubre</option>
    <option>Noviembre</option>
    <option>Diciembre</option>
</select>

</div>

<div class="center">

<model-viewer id="visor" src="camas24.glb" camera-controls></model-viewer>

<div class="controles">
    <button onclick="moverArriba()">⬆️</button>
    <button onclick="moverAbajo()">⬇️</button>
    <button onclick="moverIzquierda()">⬅️</button>
    <button onclick="moverDerecha()">➡️</button>
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">-</button>
</div>

</div>

<div class="right-panel">
<div class="card">

<div class="item">
    <div class="label">Indicador</div>
    <div id="val1" class="value">—</div>
</div>

<div class="item">
    <div class="label">Año</div>
    <div id="val2" class="value">—</div>
</div>

<div class="item">
    <div class="label">Mes</div>
    <div id="val3" class="value">—</div>
</div>

<h2 id="valorFinal">--</h2>

</div>
</div>

</div>
<script>
const visor = document.getElementById("visor");

let theta = 0;
let phi = 75;
let radius = 2.5;

let indicador = "";
let anio = "";
let mes = "";

const API_URL = "https://api-hsjmelipilla.onrender.com/api/valores/";

// ================= CAMERA =================
function actualizarCamara() {
    visor.cameraOrbit = `${theta}deg ${phi}deg ${radius}m`;
}

function moverIzquierda(){ theta -= 10; actualizarCamara(); }
function moverDerecha(){ theta += 10; actualizarCamara(); }
function moverArriba(){ phi -= 10; actualizarCamara(); }
function moverAbajo(){ phi += 10; actualizarCamara(); }
function zoomIn(){ radius = Math.max(1, radius - 0.3); actualizarCamara(); }
function zoomOut(){ radius += 0.3; actualizarCamara(); }

// ================= BOTONES =================
function actualizarBoton(btn, id, texto) {
    btn.parentElement.querySelectorAll("button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    document.getElementById(id).innerText = texto;

    if(id === "val1") indicador = texto;
    if(id === "val2") anio = texto;

    obtenerDatos();
}

// ================= MES =================
function actualizarMes() {
    const select = document.querySelector("select");
    mes = select.value;

    document.getElementById("val3").innerText = mes;

    obtenerDatos();
}

// ================= API =================
async function obtenerDatos() {

    if(!indicador || !anio || !mes) return;

    document.getElementById("valorFinal").innerText = "Cargando...";

    try {
        const url = `${API_URL}?servicio=obstetricia&indicador=${encodeURIComponent(indicador)}&anio=${anio}&mes=${encodeURIComponent(mes)}`;

        const response = await fetch(url);

        if(!response.ok) {
            throw new Error("HTTP " + response.status);
        }

        const data = await response.json();

        console.log("RESPUESTA API:", data);

        // 🔥 soporte para múltiples formatos de API
        let valor =
            data.valor ??
            data?.data?.valor ??
            (Array.isArray(data) ? data[0]?.valor : null) ??
            null;

        document.getElementById("valorFinal").innerText =
            valor ?? "Sin datos";

    } catch (error) {
        console.error("ERROR API:", error);
        document.getElementById("valorFinal").innerText = "Error API";
    }
}
</script>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>

</body>
</html>
