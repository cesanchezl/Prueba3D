<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visor 3D - Obstetricia</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#eef2f7;
}

.navbar{
    display:flex;
    background-color:#333;
}

.navbar a{
    color:white;
    padding:14px 16px;
    text-decoration:none;
}

.navbar a:hover{
    background-color:#575757;
}

.dropdown{
    position:relative;
}

.dropdown-content{
    display:none;
    position:absolute;
    background:white;
    min-width:160px;
    z-index:100;
}

.dropdown:hover .dropdown-content{
    display:block;
}

.dropdown-content a{
    display:block;
    color:#333;
}

.main{
    display:flex;
    height:calc(100vh - 48px);
}

.sidebar{
    width:260px;
    background:white;
    padding:20px;
    overflow-y:auto;
    border-right:1px solid #ddd;
}

.button-group{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:15px;
}

.button-group button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#f1f3f7;
    cursor:pointer;
    transition:0.2s;
}

.button-group button:hover{
    background:#dfe4ea;
}

.button-group button.active{
    background:#2c2c54;
    color:white;
}

select{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

.center{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:#4a6cf7;
}

model-viewer{
    width:85%;
    height:500px;
}

.controles{
    margin-top:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.controles button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#2c2c54;
    color:white;
    cursor:pointer;
}

.controles button:hover{
    background:#40407a;
}

.right-panel{
    width:320px;
    background:white;
    padding:20px;
    border-left:1px solid #ddd;
}

.card{
    background:#2c2c54;
    color:white;
    padding:20px;
    border-radius:20px;
}

.item{
    margin-bottom:18px;
}

.label{
    font-size:14px;
    opacity:0.8;
}

.value{
    font-size:18px;
    font-weight:bold;
}

#valorFinal{
    font-size:40px;
    margin-top:20px;
    text-align:center;
}

.estado{
    margin-top:15px;
    text-align:center;
    font-size:14px;
    opacity:0.8;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="index.html">Inicio</a>
    <a href="piso1.html">Piso 1</a>

    <div class="dropdown">
        <a href="#">Piso 2 ▼</a>

        <div class="dropdown-content">
            <a href="piso2.html">Piso 2</a>
            <a href="uci6.html">UCI</a>
            <a href="uti18.html">UTI</a>
        </div>
    </div>

    <a href="obstetricia.html">Obstetricia</a>
</div>

<div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>Indicadores</h2>

        <div class="button-group">

            <button onclick="seleccionarIndicador(this,'Promedio Días Estada')">
                Días Estadia
            </button>

            <button onclick="seleccionarIndicador(this,'Índice de Rotación')">
                Índice de Rotación
            </button>

            <button onclick="seleccionarIndicador(this,'Promedio Camas Disponibles')">
                Promedio Camas
            </button>

            <button onclick="seleccionarIndicador(this,'Índice de Sustitución')">
                Índice Sustitución
            </button>

            <button onclick="seleccionarIndicador(this,'Índice de Ocupación')">
                Índice Ocupación
            </button>

            <button onclick="seleccionarIndicador(this,'Letalidad')">
                Letalidad
            </button>

        </div>

        <h2>Año</h2>

        <div class="button-group">

            <button onclick="seleccionarAnio(this,'2023')">
                2025
            </button>

            <button onclick="seleccionarAnio(this,'2024')">
                2025
            </button>
            
            <button onclick="seleccionarAnio(this,'2025')">
                2025
            </button>

        </div>

        <h2>Mes</h2>

        <select id="mesSelect" onchange="actualizarMes()">

            <option value="">Seleccionar Mes</option>

            <option value="1">Enero</option>
            <option value="2">Febrero</option>
            <option value="3">Marzo</option>
            <option value="4">Abril</option>
            <option value="5">Mayo</option>
            <option value="6">Junio</option>
            <option value="7">Julio</option>
            <option value="8">Agosto</option>
            <option value="9">Septiembre</option>
            <option value="10">Octubre</option>
            <option value="11">Noviembre</option>
            <option value="12">Diciembre</option>

        </select>

    </div>

    <!-- CENTRO -->
    <div class="center">

        <model-viewer
            id="visor"
            src="camas24.glb"
            camera-controls
            auto-rotate>
        </model-viewer>

        <div class="controles">

            <button onclick="moverArriba()">⬆️</button>
            <button onclick="moverAbajo()">⬇️</button>
            <button onclick="moverIzquierda()">⬅️</button>
            <button onclick="moverDerecha()">➡️</button>
            <button onclick="zoomIn()">+</button>
            <button onclick="zoomOut()">-</button>

        </div>

    </div>

    <!-- PANEL DERECHO -->
    <div class="right-panel">

        <div class="card">

            <div class="item">
                <div class="label">Servicio</div>
                <div class="value">Obstetricia</div>
            </div>

            <div class="item">
                <div class="label">Indicador</div>
                <div id="val1" class="value">—</div>
            </div>

            <div class="item">
                <div class="label">Año</div>
                <div id="val2" class="value">—</div>
            </div>

            <div class="item">
                <div class="label">Mes</div>
                <div id="val3" class="value">—</div>
            </div>

            <div class="item">
                <div class="label">Valor Calculado</div>
                <h2 id="valorFinal">--</h2>
            </div>

            <div id="estado" class="estado">
                Selecciona filtros
            </div>

        </div>

    </div>

</div>

<script>

const visor = document.getElementById("visor");

let theta = 0;
let phi = 75;
let radius = 2.5;

let indicador = "";
let anio = "";
let mes = "";

const API_URL = "https://api-hsjmelipilla.onrender.com/api/valores/";

// ================= CAMERA =================

function actualizarCamara(){
    visor.cameraOrbit = `${theta}deg ${phi}deg ${radius}m`;
}

function moverIzquierda(){
    theta -= 10;
    actualizarCamara();
}

function moverDerecha(){
    theta += 10;
    actualizarCamara();
}

function moverArriba(){
    phi -= 10;
    actualizarCamara();
}

function moverAbajo(){
    phi += 10;
    actualizarCamara();
}

function zoomIn(){
    radius = Math.max(1, radius - 0.3);
    actualizarCamara();
}

function zoomOut(){
    radius += 0.3;
    actualizarCamara();
}

// ================= FILTROS =================

function seleccionarIndicador(btn,texto){

    document
        .querySelectorAll(".sidebar .button-group:first-of-type button")
        .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");

    indicador = texto;

    document.getElementById("val1").innerText = texto;

    obtenerDatos();
}

function seleccionarAnio(btn,texto){

    document
        .querySelectorAll(".sidebar .button-group:nth-of-type(2) button")
        .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");

    anio = parseInt(texto);

    document.getElementById("val2").innerText = texto;

    obtenerDatos();
}

function actualizarMes(){

    const select = document.getElementById("mesSelect");

    mes = parseInt(select.value);

    const nombreMes =
        select.options[select.selectedIndex].text;

    document.getElementById("val3").innerText = nombreMes;

    obtenerDatos();
}

// ================= API =================

async function obtenerDatos(){

    if(!indicador || !anio || !mes){
        return;
    }

    const estado = document.getElementById("estado");
    const valorFinal = document.getElementById("valorFinal");

    estado.innerText = "Consultando API...";
    valorFinal.innerText = "...";

    try{

        const response = await fetch(API_URL);

        if(!response.ok){
            throw new Error("Error HTTP " + response.status);
        }

        const datos = await response.json();

        console.log("DATOS API:", datos);

        // buscar coincidencia exacta
        const resultado = datos.find(item =>

            item.servicio_nombre === "Obstetricia" &&
            item.indicador_nombre === indicador &&
            item.anio === anio &&
            item.mes === mes
        );

        console.log("RESULTADO:", resultado);

        if(resultado){

            valorFinal.innerText = resultado.valor_calculado;

            estado.innerText = "Datos cargados correctamente";

        }else{

            valorFinal.innerText = "--";

            estado.innerText = "No hay datos disponibles";
        }

    }catch(error){

        console.error(error);

        valorFinal.innerText = "ERROR";

        estado.innerText = "Error al conectar API";
    }
}

</script>

<script
type="module"
src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js">
</script>

</body>
</html>
