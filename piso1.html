<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visor 3D</title>

<style>
/* NAVBAR ARRIBA */
.navbar {
    background-color: #333;
    display: flex;
}

.navbar a {
    color: white;
    padding: 14px 16px;
    text-decoration: none;
}

.navbar a:hover {
    background-color: #575757;
}

/* Dropdown */
.dropdown {
    position: relative;
}

.dropdown-content {
    display: none;
    position: absolute;
    background: white;
    min-width: 160px;
}

.dropdown:hover .dropdown-content {
    display: block;
}

/* LAYOUT GENERAL */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #eef2f7;
}

/* CONTENEDOR DE 3 COLUMNAS */
.main {
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 260px;
    height: calc(100vh - 50px);
    background: white;
    padding: 20px;
}

/* CENTRO */
.center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* VISOR */
model-viewer {
    width: 80%;
    height: 500px;
}

/* CONTROLES */
.controles {
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

.controles button {
    padding: 10px;
    background: #2c2c54;
    color: white;
    border: none;
    border-radius: 8px;
}

/* PANEL DERECHO */
.right-panel {
    width: 300px;
    padding: 20px;
}

.card {
    background: #2c2c54;
    color: white;
    padding: 20px;
    border-radius: 20px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="index.html">Inicio</a>
    <a href="piso1.html">Piso 1</a>

    <div class="dropdown">
        <a>Piso 2 ▼</a>
        <div class="dropdown-content">
            <a href="piso2.html">Piso 2</a>
            <a href="uci6.html">UCI</a>
            <a href="uti18.html">UTI</a>
        </div>
    </div>

    <a href="obstetricia.html">Obstetricia</a>
</div>

<!-- CONTENIDO EN 3 COLUMNAS -->
<div class="main">

    <!-- IZQUIERDA -->
    <div class="sidebar">
        <h2>Indicadores</h2>
    </div>

    <!-- CENTRO -->
    <div class="center">

        <model-viewer
            id="visor"
            src="piso1.glb"
            camera-controls>
        </model-viewer>

        <div class="controles">
            <button onclick="moverArriba()">⬆️</button>
            <button onclick="moverAbajo()">⬇️</button>
            <button onclick="moverIzquierda()">⬅️</button>
            <button onclick="moverDerecha()">➡️</button>
            <button onclick="zoomIn()">+</button>
            <button onclick="zoomOut()">-</button>
        </div>

    </div>

    <!-- DERECHA -->
    <div class="right-panel">
        <div class="card">
            Panel derecho
        </div>
    </div>

</div>

<script>
const visor = document.getElementById("visor");

let theta = 0;
let phi = 75;
let radius = 2.5;

function actualizarCamara() {
    visor.cameraOrbit = `${theta}deg ${phi}deg ${radius}m`;
}

function moverIzquierda(){ theta -= 10; actualizarCamara(); }
function moverDerecha(){ theta += 10; actualizarCamara(); }
function moverArriba(){ phi -= 10; actualizarCamara(); }
function moverAbajo(){ phi += 10; actualizarCamara(); }
function zoomIn(){ radius -= 0.3; actualizarCamara(); }
function zoomOut(){ radius += 0.3; actualizarCamara(); }
</script>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>

</body>
</html>
