<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visor 3D - Piso 1</title>

<style>
/* TU CSS ORIGINAL SIN CAMBIOS */
*{box-sizing:border-box;}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#eef2f7;
}

.navbar{
    display:flex;
    align-items:center;
    background-color:#333;
    height:48px;
}

.navbar a{
    color:white;
    padding:14px 16px;
    text-decoration:none;
    min-width:110px;
    text-align:center;
}

.navbar a:hover{
    background-color:#575757;
}

.navbar-select{
    background:#333;
    color:white;
    border:none;
    padding:14px 16px;
    font-size:16px;
    cursor:pointer;
    outline:none;
    min-width:110px;
    height:48px;
    text-align:center;
}

.navbar-select:hover{
    background-color:#575757;
}

.main{
    display:flex;
    height:calc(100vh - 48px);
}

.sidebar{
    width:240px;
    background:white;
    padding:14px;
    border-right:1px solid #ddd;
}

.center{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:#4a6cf7;
}

model-viewer{
    width:85%;
    height:460px;
}

.controles{
    margin-top:12px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.controles button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#2c2c54;
    color:white;
    cursor:pointer;
}

.right-panel{
    width:300px;
    background:white;
    padding:16px;
    border-left:1px solid #ddd;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <a href="index.html">Inicio</a>
    <a href="piso1.html">Piso 1</a>

    <select class="navbar-select" onchange="irAPagina(this.value)">
        <option value="">Piso 2</option>
        <option value="uci6.html">UCI</option>
        <option value="uti18.html">UTI</option>
    </select>

    <a href="#">Piso 3</a>

    <select class="navbar-select" onchange="irAPagina(this.value)">
        <option value="">Piso 4</option>
        <option value="obstetricia.html">Obstetricia</option>
    </select>

</div>

<!-- MAIN -->
<div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>Bienvenido</h2>
        <p>Sistema de visualización 3D hospitalario</p>

    </div>

    <!-- CENTRO -->
    <div class="center">

        <model-viewer
            id="visor"
            src="piso1.glb"
            camera-controls
            auto-rotate>
        </model-viewer>

        <div class="controles">

            <button onclick="moverArriba()">⬆️</button>
            <button onclick="moverAbajo()">⬇️</button>
            <button onclick="moverIzquierda()">⬅️</button>
            <button onclick="moverDerecha()">➡️</button>
            <button onclick="zoomIn()">+</button>
            <button onclick="zoomOut()">-</button>

        </div>

    </div>

    <!-- PANEL DERECHO -->
    <div class="right-panel">

        <h2>Hospital de Melipilla</h2>
        <p>Vista general del piso 1</p>

    </div>

</div>

<!-- SCRIPT -->
<script>

const visor = document.getElementById("visor");

let theta = 0;
let phi = 75;
let radius = 2.5;

function irAPagina(url){
    if(url) window.location.href = url;
}

function actualizarCamara(){
    visor.cameraOrbit = `${theta}deg ${phi}deg ${radius}m`;
}

function moverIzquierda(){ theta -= 10; actualizarCamara(); }
function moverDerecha(){ theta += 10; actualizarCamara(); }
function moverArriba(){ phi -= 10; actualizarCamara(); }
function moverAbajo(){ phi += 10; actualizarCamara(); }

function zoomIn(){
    radius = Math.max(1, radius - 0.3);
    actualizarCamara();
}

function zoomOut(){
    radius += 0.3;
    actualizarCamara();
}

</script>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>

</body>
</html>
