<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visor 3D</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="index.html">Inicio</a>
    <a href="piso1.html">Piso 1</a>

    <div class="dropdown">
        <a>Piso 2 ▼</a>
        <div class="dropdown-content">
            <a href="piso2.html">Piso 2</a>
            <a href="uci6.html">UCI</a>
            <a href="uti18.html">UTI</a>
        </div>
    </div>

    <a href="obstetricia.html">Obstetricia</a>
</div>

<!-- CONTENIDO -->
<div class="main">

    <div class="sidebar">
        <h2>Indicadores</h2>
    </div>

    <div class="center">
        <model-viewer id="visor" src="piso1.glb" camera-controls></model-viewer>

        <div class="controles">
            <button onclick="moverArriba()">⬆️</button>
            <button onclick="moverAbajo()">⬇️</button>
            <button onclick="moverIzquierda()">⬅️</button>
            <button onclick="moverDerecha()">➡️</button>
            <button onclick="zoomIn()">+</button>
            <button onclick="zoomOut()">-</button>
        </div>
    </div>

    <div class="right-panel">
        <div class="card">Panel derecho</div>
    </div>

</div>

<script>
const visor = document.getElementById("visor");

let theta = 0;
let phi = 75;
let radius = 2.5;

function actualizarCamara() {
    visor.cameraOrbit = `${theta}deg ${phi}deg ${radius}m`;
}

function moverIzquierda(){ theta -= 10; actualizarCamara(); }
function moverDerecha(){ theta += 10; actualizarCamara(); }
function moverArriba(){ phi -= 10; actualizarCamara(); }
function moverAbajo(){ phi += 10; actualizarCamara(); }
function zoomIn(){ radius -= 0.3; actualizarCamara(); }
function zoomOut(){ radius += 0.3; actualizarCamara(); }
</script>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>

</body>
</html>
