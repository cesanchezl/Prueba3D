<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visor 3D</title>

<style>
nav {
    background-color: #333;
    padding: 10px;
}
.navbar a {
    float: left;
    color: white;
    padding: 14px 16px;
    text-decoration: none;
}
.navbar a:hover {
    background-color: #575757;
}

/* Dropdown */
.dropdown {
    float: left;
    overflow: hidden;
}
.dropdown .dropbtn {
    cursor: pointer;
}
.dropdown-content {
    display: none;
    position: absolute;
    background-color: #f9f9f9;
    min-width: 160px;
    box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
}
.dropdown-content a {
    color: black;
    padding: 12px 16px;
    display: block;
}
.dropdown:hover .dropdown-content {
    display: block;
}

/* Layout */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    background: #eef2f7;
}

/* Sidebar */
.sidebar {
    width: 260px;
    height: 100vh;
    background: #ffffff;
    padding: 25px;
    box-shadow: 4px 0 15px rgba(0,0,0,0.05);
}

.button-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 15px;
}

.button-group button {
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #f1f3f7;
    cursor: pointer;
}

.button-group button.active {
    background: #2c2c54;
    color: white;
}

/* CENTRO (ARREGLADO) */
.center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

model-viewer {
    width: 80%;
    height: 500px;
}

/* CONTROLES */
.controles {
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

.controles button {
    padding: 10px 12px;
    border: none;
    border-radius: 8px;
    background: #2c2c54;
    color: white;
    cursor: pointer;
}

.controles button:hover {
    background: #40407a;
}

/* Panel derecho */
.right-panel {
    width: 300px;
    height: 100vh;
    padding: 20px;
    display: flex;
    align-items: center;
}

.card {
    width: 100%;
    background: linear-gradient(135deg, #1e1e2f, #2c2c54);
    color: white;
    padding: 20px;
    border-radius: 20px;
}

.item {
    margin-bottom: 15px;
}

.label {
    font-size: 14px;
}

.value {
    font-size: 18px;
    font-weight: bold;
}
</style>
</head>

<body>

<nav class="navbar">
    <a href="index.html">Inicio</a>
    <a href="piso1.html">Piso 1</a>
    <div class="dropdown">
        <a class="dropbtn">Piso 2 ▼</a>
        <div class="dropdown-content">
            <a href="piso2.html">Piso 2</a>
            <a href="uci6.html">UCI</a>
            <a href="uti18.html">UTI</a>
        </div>
    </div>
    <a href="obstetricia.html">Obstetricia</a>
</nav>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Indicadores</h2>

    <div class="button-group">
        <button onclick="actualizarBoton(this,'val1','Promedio Dias de Estadia')">Promedio Dias</button>
        <button onclick="actualizarBoton(this,'val1','Indice de Rotacion')">Rotación</button>
    </div>

    <h2>Año</h2>
    <div class="button-group">
        <button onclick="actualizarBoton(this,'val2','2023')">2023</button>
        <button onclick="actualizarBoton(this,'val2','2024')">2024</button>
    </div>
</div>

<!-- CENTRO -->
<div class="center">

    <model-viewer
        id="visor"
        src="piso1.glb"
        camera-controls
        alt="modelo 3D"
        shadow-intensity="1">
    </model-viewer>

    <div class="controles">
        <button onclick="moverArriba()">⬆️</button>
        <button onclick="moverAbajo()">⬇️</button>
        <button onclick="moverIzquierda()">⬅️</button>
        <button onclick="moverDerecha()">➡️</button>
        <button onclick="zoomIn()">Zoom +</button>
        <button onclick="zoomOut()">Zoom -</button>
    </div>

</div>

<!-- Panel derecho -->
<div class="right-panel">
    <div class="card">
        <div class="item">
            <div class="label">Indicador</div>
            <div id="val1" class="value">—</div>
        </div>
        <div class="item">
            <div class="label">Año</div>
            <div id="val2" class="value">—</div>
        </div>
    </div>
</div>

<script>
function actualizarBoton(btn, id, texto) {
    const grupo = btn.parentElement;
    grupo.querySelectorAll("button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(id).innerText = texto;
}

/* CONTROL DE CÁMARA */
const visor = document.getElementById("visor");

let theta = 0;
let phi = 75;
let radius = 2.5;

function actualizarCamara() {
    visor.cameraOrbit = `${theta}deg ${phi}deg ${radius}m`;
}

function moverIzquierda(){ theta -= 10; actualizarCamara(); }
function moverDerecha(){ theta += 10; actualizarCamara(); }
function moverArriba(){ phi -= 10; actualizarCamara(); }
function moverAbajo(){ phi += 10; actualizarCamara(); }
function zoomIn(){ radius -= 0.3; actualizarCamara(); }
function zoomOut(){ radius += 0.3; actualizarCamara(); }
</script>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>

</body>
</html>
