<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visor 3D</title>

<style>
/* RESET */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #eef2f7;
}

/* NAVBAR */
.navbar {
    display: flex;
    background-color: #333;
}

.navbar a {
    color: white;
    padding: 14px 16px;
    text-decoration: none;
}

.navbar a:hover {
    background-color: #575757;
}

/* DROPDOWN */
.dropdown {
    position: relative;
}

.dropdown-content {
    display: none;
    position: absolute;
    background: white;
    min-width: 160px;
}

.dropdown:hover .dropdown-content {
    display: block;
}

/* LAYOUT PRINCIPAL */
.main {
    display: flex;
    height: calc(100vh - 48px);
}

/* SIDEBAR IZQUIERDA */
.sidebar {
    width: 260px;
    background: white;
    padding: 20px;
    overflow-y: auto;
}

.button-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 15px;
}

.button-group button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #f1f3f7;
    cursor: pointer;
}

.button-group button.active {
    background: #2c2c54;
    color: white;
}

/* CENTRO */
.center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #4a6cf7;
}

model-viewer {
    width: 85%;
    height: 500px;
}

/* CONTROLES */
.controles {
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

.controles button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #2c2c54;
    color: white;
    cursor: pointer;
}

.controles button:hover {
    background: #40407a;
}

/* PANEL DERECHO */
.right-panel {
    width: 300px;
    background: white;
    padding: 20px;
}

.card {
    background: #2c2c54;
    color: white;
    padding: 20px;
    border-radius: 20px;
}

.item {
    margin-bottom: 15px;
}

.label {
    font-size: 14px;
    opacity: 0.8;
}

.value {
    font-size: 18px;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="index.html">Inicio</a>
    <a href="piso1.html">Piso 1</a>

    <div class="dropdown">
        <a>Piso 2 ▼</a>
        <div class="dropdown-content">
            <a href="piso2.html">Piso 2</a>
            <a href="uci6.html">UCI</a>
            <a href="uti18.html">UTI</a>
        </div>
    </div>

    <a href="obstetricia.html">Obstetricia</a>
</div>

<!-- CONTENIDO -->
<div class="main">

    <!-- IZQUIERDA -->
    <div class="sidebar">

        <h2>Indicadores</h2>

        <div class="button-group">
            <button onclick="actualizarBoton(this,'val1','Promedio Dias de Estadia')">Días Estadia</button>
            <button onclick="actualizarBoton(this,'val1','Indice de Rotacion')">Rotación</button>
            <button onclick="actualizarBoton(this,'val1','Indice de Ocupacion')">Ocupación</button>
        </div>

        <h2>Año</h2>

        <div class="button-group">
            <button onclick="actualizarBoton(this,'val2','2023')">2023</button>
            <button onclick="actualizarBoton(this,'val2','2024')">2024</button>
            <button onclick="actualizarBoton(this,'val2','2025')">2025</button>
        </div>

        <h2>Mes</h2>

        <select onchange="actualizarMes()">
            <option disabled selected>Seleccionar Mes</option>
            <option>Enero</option>
            <option>Febrero</option>
            <option>Marzo</option>
            <option>Abril</option>
            <option>Mayo</option>
            <option>Junio</option>
            <option>Julio</option>
            <option>Agosto</option>
            <option>Septiembre</option>
            <option>Octubre</option>
            <option>Noviembre</option>
            <option>Diciembre</option>
        </select>

    </div>

    <!-- CENTRO -->
    <div class="center">

        <model-viewer
            id="visor"
            src="piso1.glb"
            camera-controls>
        </model-viewer>

        <div class="controles">
            <button onclick="moverArriba()">⬆️</button>
            <button onclick="moverAbajo()">⬇️</button>
            <button onclick="moverIzquierda()">⬅️</button>
            <button onclick="moverDerecha()">➡️</button>
            <button onclick="zoomIn()">+</button>
            <button onclick="zoomOut()">-</button>
        </div>

    </div>

    <!-- DERECHA -->
    <div class="right-panel">

        <div class="card">

            <div class="item">
                <div class="label">Indicador</div>
                <div id="val1" class="value">—</div>
            </div>

            <div class="item">
                <div class="label">Año</div>
                <div id="val2" class="value">—</div>
            </div>

            <div class="item">
                <div class="label">Mes</div>
                <div id="val3" class="value">—</div>
            </div>

            <h2 id="valorFinal">--</h2>

        </div>

    </div>

</div>

<script>
const visor = document.getElementById("visor");

let theta = 0;
let phi = 75;
let radius = 2.5;

function actualizarCamara() {
    visor.cameraOrbit = `${theta}deg ${phi}deg ${radius}m`;
}

function moverIzquierda(){ theta -= 10; actualizarCamara(); }
function moverDerecha(){ theta += 10; actualizarCamara(); }
function moverArriba(){ phi -= 10; actualizarCamara(); }
function moverAbajo(){ phi += 10; actualizarCamara(); }
function zoomIn(){ radius -= 0.3; actualizarCamara(); }
function zoomOut(){ radius += 0.3; actualizarCamara(); }

function actualizarBoton(btn, id, texto) {
    btn.parentElement.querySelectorAll("button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(id).innerText = texto;

    document.getElementById("valorFinal").innerText =
        (Math.random() * 5).toFixed(2);
}

function actualizarMes() {
    const select = document.querySelector("select");
    document.getElementById("val3").innerText = select.value;
}
</script>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>

</body>
</html>
