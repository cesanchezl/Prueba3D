<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visor 3D - UCI</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#eef2f7;
}

/* NAVBAR */
.navbar{
    display:flex;
    background:#333;
}

.navbar a{
    color:white;
    padding:14px 16px;
    text-decoration:none;
}

.navbar a:hover{
    background:#575757;
}

.dropdown{
    position:relative;
}

.dropdown-content{
    display:none;
    position:absolute;
    background:white;
    min-width:160px;
    z-index:100;
}

.dropdown-content a{
    color:#333;
    display:block;
}

.dropdown:hover .dropdown-content{
    display:block;
}

/* MAIN */
.main{
    display:flex;
    height:calc(100vh - 48px);
}

/* SIDEBAR */
.sidebar{
    width:260px;
    background:white;
    padding:20px;
    overflow-y:auto;
    border-right:1px solid #ddd;
}

.sidebar h2{
    margin-top:10px;
    color:#2c2c54;
}

.button-group{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:20px;
}

.button-group button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#f1f3f7;
    cursor:pointer;
    transition:0.2s;
    font-size:14px;
}

.button-group button:hover{
    background:#dfe4ea;
}

.button-group button.active{
    background:#2c2c54;
    color:white;
}

/* CENTER */
.center{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:#4a6cf7;
    position:relative;
}

model-viewer{
    width:85%;
    height:500px;
    background:transparent;
}

.controles{
    margin-top:15px;
    display:flex;
    gap:10px;
}

.controles button{
    padding:10px 14px;
    border:none;
    border-radius:8px;
    background:#2c2c54;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.controles button:hover{
    background:#40407a;
}

/* RIGHT PANEL */
.right-panel{
    width:320px;
    background:white;
    padding:20px;
    border-left:1px solid #ddd;
}

.card{
    background:#2c2c54;
    color:white;
    padding:25px;
    border-radius:20px;
}

.item{
    margin-bottom:18px;
}

.label{
    font-size:14px;
    opacity:0.8;
}

.value{
    font-size:18px;
    font-weight:bold;
}

#valorFinal{
    margin-top:30px;
    font-size:42px;
    text-align:center;
    color:#00ffcc;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="index.html">Inicio</a>
    <a href="piso1.html">Piso 1</a>

    <div class="dropdown">
        <a href="#">Piso 2 ▼</a>

        <div class="dropdown-content">
            <a href="piso2.html">Piso 2</a>
            <a href="uci6.html">UCI</a>
            <a href="uti18.html">UTI</a>
        </div>
    </div>

    <a href="obstetricia.html">Obstetricia</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>Indicadores</h2>

        <div class="button-group">

            <button onclick="actualizarBoton(this,'val1','Promedio Dias de Estadia')">
                Días Estadia
            </button>

            <button onclick="actualizarBoton(this,'val1','Indice de Rotacion')">
                Índice Rotación
            </button>

            <button onclick="actualizarBoton(this,'val1','Promedio de Camas Disponibles')">
                Promedio Camas
            </button>

            <button onclick="actualizarBoton(this,'val1','Indice de Sustitucion')">
                Índice Sustitución
            </button>

            <button onclick="actualizarBoton(this,'val1','Indice de Ocupacion')">
                Índice Ocupación
            </button>

            <button onclick="actualizarBoton(this,'val1','Lealtad')">
                Lealtad
            </button>

        </div>

        <h2>Año</h2>

        <div class="button-group">

            <button onclick="actualizarBoton(this,'val2','2023')">
                2023
            </button>

            <button onclick="actualizarBoton(this,'val2','2024')">
                2024
            </button>

            <button onclick="actualizarBoton(this,'val2','2025')">
                2025
            </button>

        </div>

        <h2>Mes</h2>

        <select onchange="actualizarMes()" style="width:100%;padding:10px;border-radius:8px;">

            <option disabled selected>Seleccionar Mes</option>

            <option>Enero</option>
            <option>Febrero</option>
            <option>Marzo</option>
            <option>Abril</option>
            <option>Mayo</option>
            <option>Junio</option>
            <option>Julio</option>
            <option>Agosto</option>
            <option>Septiembre</option>
            <option>Octubre</option>
            <option>Noviembre</option>
            <option>Diciembre</option>

        </select>

    </div>

    <!-- CENTER -->
    <div class="center">

        <model-viewer
            id="visor"
            src="camas6.glb"
            camera-controls
            auto-rotate
            shadow-intensity="1">

        </model-viewer>

        <div class="controles">

            <button onclick="moverArriba()">⬆️</button>
            <button onclick="moverAbajo()">⬇️</button>
            <button onclick="moverIzquierda()">⬅️</button>
            <button onclick="moverDerecha()">➡️</button>
            <button onclick="zoomIn()">＋</button>
            <button onclick="zoomOut()">－</button>

        </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

        <div class="card">

            <div class="item">
                <div class="label">Servicio</div>
                <div class="value">UCI</div>
            </div>

            <div class="item">
                <div class="label">Indicador</div>
                <div id="val1" class="value">—</div>
            </div>

            <div class="item">
                <div class="label">Año</div>
                <div id="val2" class="value">—</div>
            </div>

            <div class="item">
                <div class="label">Mes</div>
                <div id="val3" class="value">—</div>
            </div>

            <h2 id="valorFinal">--</h2>

        </div>

    </div>

</div>

<!-- SCRIPT -->
<script>

const visor = document.getElementById("visor");

let theta = 0;
let phi = 75;
let radius = 2.5;

let indicador = "";
let anio = "";
let mes = "";

/* API */
const API_URL = "https://api-hsjmelipilla.onrender.com/api/valores/";

/* CAMERA */
function actualizarCamara(){
    visor.cameraOrbit = `${theta}deg ${phi}deg ${radius}m`;
}

function moverIzquierda(){
    theta -= 10;
    actualizarCamara();
}

function moverDerecha(){
    theta += 10;
    actualizarCamara();
}

function moverArriba(){
    phi -= 10;
    actualizarCamara();
}

function moverAbajo(){
    phi += 10;
    actualizarCamara();
}

function zoomIn(){
    radius = Math.max(1, radius - 0.3);
    actualizarCamara();
}

function zoomOut(){
    radius += 0.3;
    actualizarCamara();
}

/* BOTONES */
function actualizarBoton(btn,id,texto){

    btn.parentElement
       .querySelectorAll("button")
       .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");

    document.getElementById(id).innerText = texto;

    if(id === "val1"){
        indicador = texto;
    }

    if(id === "val2"){
        anio = texto;
    }

    obtenerDatos();
}

/* MES */
function actualizarMes(){

    const select = document.querySelector("select");

    mes = select.value;

    document.getElementById("val3").innerText = mes;

    obtenerDatos();
}


async function obtenerDatos(){

    if(!indicador || !anio || !mes){
        return;
    }

    const estado = document.getElementById("estado");
    const valorFinal = document.getElementById("valorFinal");

    estado.innerText = "Consultando API...";
    valorFinal.innerText = "...";

    try{

        const response = await fetch(API_URL);

        if(!response.ok){
            throw new Error("Error HTTP " + response.status);
        }

        const datos = await response.json();

        console.log("DATOS API:", datos);

        // buscar coincidencia exacta
        const resultado = datos.find(item =>

            item.servicio_nombre === "UCI" &&
            item.indicador_nombre === indicador &&
            item.anio === anio &&
            item.mes === mes
        );

        console.log("RESULTADO:", resultado);

        if(resultado){

            valorFinal.innerText = resultado.valor_calculado;

            estado.innerText = "Datos cargados correctamente";

        }else{

            valorFinal.innerText = "Sin datos";

            estado.innerText =
                `No existen datos para ${anio}`;
        }

    }catch(error){

        console.error(error);

        valorFinal.innerText = "ERROR";

        estado.innerText = "Error al conectar API";
    }
}

</script>

<script type="module"
src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js">
</script>

</body>
</html>
