<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visor 3D - Obstetricia</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#eef2f7;
}

/* NAVBAR */
.navbar{
    display:flex;
    align-items:center;
    background-color:#333;
    height:48px;
}

.navbar a{
    color:white;
    padding:14px 16px;
    text-decoration:none;
    min-width:110px;
    text-align:center;
}

.navbar a:hover{
    background-color:#575757;
}

/* SELECT NAVBAR */
.navbar-select{
    background:#333;
    color:white;
    border:none;
    padding:14px 16px;
    font-size:16px;
    cursor:pointer;
    outline:none;
    min-width:110px;
    height:48px;
    text-align:center;
}

.navbar-select:hover{
    background-color:#575757;
}

/* MAIN */
.main{
    display:flex;
    height:calc(100vh - 48px);
}

/* SIDEBAR */
.sidebar{
    width:240px;
    background:white;
    padding:14px;
    border-right:1px solid #ddd;
    overflow:hidden;
}

.sidebar h2{
    margin:10px 0;
    font-size:20px;
}

.button-group{
    display:flex;
    flex-direction:column;
    gap:6px;
    margin-bottom:12px;
}

.button-group button{
    padding:8px;
    border:none;
    border-radius:8px;
    background:#f1f3f7;
    cursor:pointer;
    transition:0.2s;
    font-size:14px;
}

.button-group button:hover{
    background:#dfe4ea;
}

.button-group button.active{
    background:#2c2c54;
    color:white;
}

select{
    width:100%;
    padding:8px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
}

/* CENTRO */
.center{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:#4a6cf7;
}

model-viewer{
    width:85%;
    height:460px;
}

.controles{
    margin-top:12px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.controles button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#2c2c54;
    color:white;
    cursor:pointer;
}

.controles button:hover{
    background:#40407a;
}

/* PANEL DERECHO */
.right-panel{
    width:300px;
    background:white;
    padding:16px;
    border-left:1px solid #ddd;
}

.card{
    background:#2c2c54;
    color:white;
    padding:18px;
    border-radius:20px;
}

.item{
    margin-bottom:16px;
}

.label{
    font-size:14px;
    opacity:0.8;
}

.value{
    font-size:18px;
    font-weight:bold;
}

#valorFinal{
    font-size:38px;
    margin-top:18px;
    text-align:center;
}

.estado{
    margin-top:12px;
    text-align:center;
    font-size:14px;
    opacity:0.8;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <a href="index.html">Inicio</a>

    <a href="piso1.html">Piso 1</a>

    <!-- SELECT PISO 2 -->
    <select class="navbar-select" onchange="irAPagina(this.value)">
        <option value="">Piso 2</option>
        <option value="uci6.html">UCI</option>
        <option value="uti18.html">UTI</option>
    </select>

    <select class="navbar-select" onchange="irAPagina(this.value)">
        <option value="">Piso 4 </option>
        <option value="obstetricia.html">Obstetricia</option>
    </select>

</div>

<div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>Indicadores</h2>

        <div class="button-group">

            <button onclick="seleccionarIndicador(this,'Promedio Días Estada')">
                Días Estadia
            </button>

            <button onclick="seleccionarIndicador(this,'Índice de Rotación')">
                Índice de Rotación
            </button>

            <button onclick="seleccionarIndicador(this,'Promedio Camas Disponibles')">
                Promedio Camas
            </button>

            <button onclick="seleccionarIndicador(this,'Índice de Sustitución')">
                Índice Sustitución
            </button>

            <button onclick="seleccionarIndicador(this,'Índice de Ocupación')">
                Índice Ocupación
            </button>

            <button onclick="seleccionarIndicador(this,'Letalidad')">
                Letalidad
            </button>

        </div>

        <!-- SELECT AÑO -->
        <h2>Año</h2>

        <select id="anioSelect" onchange="actualizarAnio()">

            <option value="">Seleccionar Año</option>

            <option value="2023">2023</option>
            <option value="2024">2024</option>
            <option value="2025">2025</option>

        </select>

        <br><br>

        <!-- SELECT MES -->
        <h2>Mes</h2>

        <select id="mesSelect" onchange="actualizarMes()">

            <option value="">Seleccionar Mes</option>

            <option value="0">Todos los meses</option>

            <option value="1">Enero</option>
            <option value="2">Febrero</option>
            <option value="3">Marzo</option>
            <option value="4">Abril</option>
            <option value="5">Mayo</option>
            <option value="6">Junio</option>
            <option value="7">Julio</option>
            <option value="8">Agosto</option>
            <option value="9">Septiembre</option>
            <option value="10">Octubre</option>
            <option value="11">Noviembre</option>
            <option value="12">Diciembre</option>

        </select>

    </div>

    <!-- CENTRO -->
    <div class="center">

        <model-viewer
            id="visor"
            src="camas18.glb"
            camera-controls>
        </model-viewer>

        <div class="controles">

            <button onclick="moverArriba()">⬆️</button>
            <button onclick="moverAbajo()">⬇️</button>
            <button onclick="moverIzquierda()">⬅️</button>
            <button onclick="moverDerecha()">➡️</button>
            <button onclick="zoomIn()">+</button>
            <button onclick="zoomOut()">-</button>

        </div>

    </div>

    <!-- PANEL DERECHO -->
    <div class="right-panel">

        <div class="card">

            <div class="item">
                <div class="label">Servicio</div>
                <div class="value">UTI</div>
            </div>

            <div class="item">
                <div class="label">Indicador</div>
                <div id="val1" class="value">—</div>
            </div>

            <div class="item">
                <div class="label">Año</div>
                <div id="val2" class="value">—</div>
            </div>

            <div class="item">
                <div class="label">Mes</div>
                <div id="val3" class="value">—</div>
            </div>

            <div class="item">
                <div class="label">Valor Calculado</div>
                <h2 id="valorFinal">--</h2>
            </div>

            <div id="estado" class="estado">
                Selecciona filtros
            </div>

        </div>

    </div>

</div>

<script>

const visor = document.getElementById("visor");

let theta = 0;
let phi = 75;
let radius = 2.5;

let indicador = "";
let anio = "";
let mes = "";

const API_URL = "https://api-hsjmelipilla.onrender.com/api/valores/";

// ================= NAVBAR =================

function irAPagina(url){

    if(url){
        window.location.href = url;
    }
}

// ================= CAMERA =================

function actualizarCamara(){
    visor.cameraOrbit = `${theta}deg ${phi}deg ${radius}m`;
}

function moverIzquierda(){
    theta -= 10;
    actualizarCamara();
}

function moverDerecha(){
    theta += 10;
    actualizarCamara();
}

function moverArriba(){
    phi -= 10;
    actualizarCamara();
}

function moverAbajo(){
    phi += 10;
    actualizarCamara();
}

function zoomIn(){
    radius = Math.max(1, radius - 0.3);
    actualizarCamara();
}

function zoomOut(){
    radius += 0.3;
    actualizarCamara();
}

// ================= FILTROS =================

function seleccionarIndicador(btn,texto){

    document
        .querySelectorAll(".sidebar .button-group button")
        .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");

    indicador = texto;

    document.getElementById("val1").innerText = texto;

    obtenerDatos();
}

// ================= AÑO =================

function actualizarAnio(){

    const select = document.getElementById("anioSelect");

    anio = parseInt(select.value);

    document.getElementById("val2").innerText = select.value;

    obtenerDatos();
}

// ================= MES =================

function actualizarMes(){

    const select = document.getElementById("mesSelect");

    mes = parseInt(select.value);

    const nombreMes =
        select.options[select.selectedIndex].text;

    document.getElementById("val3").innerText = nombreMes;

    obtenerDatos();
}

// ================= API =================

async function obtenerDatos(){

    if(!indicador || !anio || isNaN(mes)){
        return;
    }

    const estado = document.getElementById("estado");
    const valorFinal = document.getElementById("valorFinal");

    estado.innerText = "Consultando API...";
    valorFinal.innerText = "...";

    try{

        const response = await fetch(API_URL);

        if(!response.ok){
            throw new Error("Error HTTP " + response.status);
        }

        const datos = await response.json();

        console.log("DATOS API:", datos);

        // ================= TODOS LOS MESES =================
        // AHORA toma el valor del MES 0 directamente
        if(mes === 0){

            const resultadoMes0 = datos.find(item =>

                item.servicio_nombre === "UTI" &&
                item.indicador_nombre === indicador &&
                item.anio === anio &&
                item.mes === 0
            );

            console.log("RESULTADO MES 0:", resultadoMes0);

            if(resultadoMes0){

                valorFinal.innerText =
                    Number(resultadoMes0.valor_calculado).toFixed(2);

                estado.innerText =
                    "Datos de todos los meses cargados";

            }else{

                valorFinal.innerText = "Sin datos";

                estado.innerText =
                    `No existen datos acumulados para ${anio}`;
            }

            return;
        }

        // ================= MES INDIVIDUAL =================

        const resultado = datos.find(item =>

            item.servicio_nombre === "UTI" &&
            item.indicador_nombre === indicador &&
            item.anio === anio &&
            item.mes === mes
        );

        console.log("RESULTADO:", resultado);

        if(resultado){

            valorFinal.innerText =
                Number(resultado.valor_calculado).toFixed(2);

            estado.innerText =
                "Datos cargados correctamente";

        }else{

            valorFinal.innerText = "Sin datos";

            estado.innerText =
                `No existen datos para ${anio}`;
        }

    }catch(error){

        console.error(error);

        valorFinal.innerText = "ERROR";

        estado.innerText = "Error al conectar API";
    }
}

</script>

<script
type="module"
src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js">
</script>

</body>
</html>
